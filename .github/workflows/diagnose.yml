name: Diagnose search retry

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "검색어"
        default: "고래밥 볶음양념맛"
      max_attempts:
        description: "최대 시도 횟수"
        default: "15"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pipeline code (private)
        uses: actions/checkout@v4
        with:
          repository: idooonge-glitch/coupang-threads-images-manual
          token: ${{ secrets.GH_PAT }}
          path: pipeline-code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r pipeline-code/requirements.txt

      - name: Show outbound IP
        run: curl -s https://ipinfo.io/json

      - name: Run diagnosis
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          PYTHONPATH: pipeline-code
        run: python pipeline-code/diagnose_search.py "${{ inputs.keyword }}" "${{ inputs.max_attempts }}"
